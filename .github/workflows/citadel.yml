# Auto-generated by Citadel. Loads the runtime EDR agent on every CI run.
# Points at Mahesh-Kete/monorepo (the working repo with the debugfs fix).

name: citadel
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  citadel-monitor:
    runs-on: [self-hosted, linux, citadel-runner]
    steps:
      - uses: actions/checkout@v4
      - name: Citadel
        uses: Mahesh-Kete/monorepo/action@main
        with:
          mode: audit
          backend-url: http://localhost:8080
          image-tag: dev
          watch-path: ${{ github.workspace }}
      - name: Smoke check
        run: |
          citadel-step "smoke check"
          echo "Hello from a Citadel-instrumented job."
          uname -a
